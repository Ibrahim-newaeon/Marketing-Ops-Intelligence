services:
  postgres:
    # Postgres 16 with pgvector pre-installed. Required by
    # core/db/migrations/0002_pgvector.sql (semantic memory retrieval).
    # On managed Postgres (RDS/Aurora/Cloud SQL), enable pgvector in
    # the parameter group instead.
    image: pgvector/pgvector:pg16
    container_name: moi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marketing_ops
    ports:
      - "5432:5432"
    volumes:
      - moi_pg_data:/var/lib/postgresql/data
      - ./core/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketing_ops"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: moi_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/marketing_ops
    env_file:
      - .env
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboards:
    build: .
    container_name: moi_dashboards
    restart: unless-stopped
    depends_on:
      - app
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - NEXT_PUBLIC_API_BASE=http://app:3000
    env_file:
      - .env
    command: ["node", "dashboards/.next/standalone/server.js"]
    ports:
      - "3001:3001"

volumes:
  moi_pg_data:
